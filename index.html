<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RIMS NICU Tracker for live neonatal admissions, outcomes, and monthly reporting."
    />
    <title>RIMS NICU Tracker</title>
    <!--
      Tailwind via CDN.  The official Play CDN compiles Tailwind on the fly in
      the browser so you can use the utility classes without a build step.
      See the Tailwind docs for more details: https://tailwindcss.com/docs/installation/play-cdn
    -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- React and ReactDOM UMD bundles for use with babel-standalone.  Using the
         development builds makes debugging easier.  You could switch to the
         production builds once everything is working. -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel stand-alone compiler.  This allows us to write JSX directly in
         our script; Babel will compile it on the fly.  The preset for React
         transforms the JSX into calls to React.createElement. -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase compat SDKs.  These scripts expose a global `firebase`
         namespace with backwards-compatible APIs for Auth and Firestore.
         Using the compat versions avoids the need for dynamic `import()`
         statements (which are not supported by Babel out of the box) and
         ensures the modules load correctly via the CDN. -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      const { useState, useMemo, useEffect } = React;

      const firebaseConfig = {
        apiKey: "AIzaSyBHYARZ5NZIH3QUNOaVijmP8gvUQUfHdK8",
        authDomain: "rims-nicu-tracker.firebaseapp.com",
        projectId: "rims-nicu-tracker",
        storageBucket: "rims-nicu-tracker.firebasestorage.app",
        messagingSenderId: "330632025948",
        appId: "1:330632025948:web:353247817bf1138f359399",
        measurementId: "G-87Q44YRFDY"
      };

      const STATUS_OPTIONS = [
        { value: 'Admitted', label: 'Admitted (Currently in NICU/SNCU)', color: 'bg-blue-100 text-blue-800 border-blue-200' },
        { value: 'Discharged', label: 'Discharged', color: 'bg-green-100 text-green-800 border-green-200' },
        { value: 'Died', label: 'Death', color: 'bg-red-100 text-red-800 border-red-200' },
        { value: 'LAMA', label: 'LAMA', color: 'bg-orange-100 text-orange-800 border-orange-200' },
        { value: 'Transferred', label: 'Transfer out / Referral', color: 'bg-purple-100 text-purple-800 border-purple-200' }
      ];

      const DIAGNOSIS_OPTIONS = ['Pre Term', 'Severe Birth Asphyxia', 'SEPSIS', 'RDS', 'Others'];
      const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

      function calculateHoursBetween(startStr, endStr) {
        if (!startStr || !endStr) return null;
        const start = new Date(startStr);
        const end = new Date(endStr);
        if (isNaN(start) || isNaN(end)) return null;
        return (end - start) / (1000 * 60 * 60);
      }

      function formatAgeString(hours) {
        if (hours === null || hours < 0) return 'Invalid';
        if (hours < 24) return `DOL 1 (${Math.floor(hours)}h)`;
        const days = Math.floor(hours / 24);
        const rem = Math.floor(hours % 24);
        return `DOL ${days + 1} (${days}d ${rem}h)`;
      }

      function Badge({ status }) {
        const config = STATUS_OPTIONS.find(s => s.value === status) || STATUS_OPTIONS[0];
        return (
          <span className={`px-2.5 py-1 rounded-full text-xs font-medium border ${config.color}`}>{status}</span>
        );
      }

      function StatCard({ title, count, emoji, colorClass }) {
        return (
          <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4 transition-all duration-300">
            <div className={`p-3 rounded-lg ${colorClass} text-xl`}>
              {emoji}
            </div>
            <div>
              <p className="text-sm font-medium text-slate-500">{title}</p>
              <h3 className="text-2xl font-bold text-slate-800">{count}</h3>
            </div>
          </div>
        );
      }

      function App() {
        const [activeTab, setActiveTab] = useState('tracker');
        const [patients, setPatients] = useState([]);
        const [searchQuery, setSearchQuery] = useState('');
        const [filterStatus, setFilterStatus] = useState('All');
        const [user, setUser] = useState(null);
        const [isSyncing, setIsSyncing] = useState(true);
        const [connectionError, setConnectionError] = useState('');
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [editingPatient, setEditingPatient] = useState(null);
        const [formData, setFormData] = useState({
          name: '',
          uhid: '',
          dob: '',
          admissionDate: '',
          unit: 'NICU',
          admissionType: 'Direct',
          diagnosis: DIAGNOSIS_OPTIONS[0],
          status: STATUS_OPTIONS[0].value,
          outcomeDate: '',
          notes: ''
        });

        const firebaseRef = React.useRef(null);

        useEffect(() => {
          let unsubscribeAuth = null;
          let unsubscribeSnap = null;
          try {
            const app = firebase.apps && firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            firebaseRef.current = { auth, db };
            auth.signInAnonymously().catch(err => console.error('Auth error:', err));
            unsubscribeAuth = auth.onAuthStateChanged(currentUser => {
              setUser(currentUser);
              if (!currentUser) {
                setConnectionError('Signed out from the live database. New changes will not sync until Firebase reconnects.');
              } else {
                setConnectionError('');
              }
            });
            unsubscribeSnap = db.collection('patients').onSnapshot(snapshot => {
              const fetched = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
              setPatients(fetched);
              setIsSyncing(false);
              setConnectionError('');
            }, error => {
              console.error('Data Sync Error:', error);
              setIsSyncing(false);
              setConnectionError('Live sync could not connect to Firestore. Check Firebase Auth and Firestore rules before using this site in production.');
            });
          } catch (err) {
            console.error('Firebase initialisation error:', err);
            setIsSyncing(false);
            setConnectionError('Firebase failed to initialize in this browser. Verify the project configuration and allowed domains before launch.');
          }
          return () => {
            if (unsubscribeAuth) unsubscribeAuth();
            if (unsubscribeSnap) unsubscribeSnap();
          };
        }, []);

        const stats = useMemo(() => {
          return {
            total: patients.length,
            admitted: patients.filter(p => p.status === 'Admitted').length,
            discharged: patients.filter(p => p.status === 'Discharged').length,
            died: patients.filter(p => p.status === 'Died').length,
            lama: patients.filter(p => p.status === 'LAMA').length,
            transferred: patients.filter(p => p.status === 'Transferred').length,
          };
        }, [patients]);

        const filteredPatients = useMemo(() => {
          const query = searchQuery.toLowerCase().trim();
          return patients
            .filter(patient => {
              if (filterStatus !== 'All' && patient.status !== filterStatus) return false;
              if (!query) return true;
              return [patient.name, patient.uhid, patient.unit, patient.diagnosis]
                .filter(Boolean)
                .some(value => String(value).toLowerCase().includes(query));
            })
            .sort((a, b) => new Date(b.admissionDate || 0) - new Date(a.admissionDate || 0));
        }, [patients, searchQuery, filterStatus]);

        const monthSummary = useMemo(() => {
          const summary = MONTHS.map(month => ({
            month,
            admission: 0,
            discharge: 0,
            death: 0,
            lama: 0,
            transferred: 0,
            active: 0,
          }));

          patients.forEach(patient => {
            if (patient.admissionDate) {
              const monthIdx = new Date(patient.admissionDate).getMonth();
              if (!isNaN(monthIdx)) summary[monthIdx].admission += 1;
            }
            if (patient.outcomeDate && patient.status) {
              const monthIdx = new Date(patient.outcomeDate).getMonth();
              if (!isNaN(monthIdx)) {
                if (patient.status === 'Discharged') summary[monthIdx].discharge += 1;
                if (patient.status === 'Died') summary[monthIdx].death += 1;
                if (patient.status === 'LAMA') summary[monthIdx].lama += 1;
                if (patient.status === 'Transferred') summary[monthIdx].transferred += 1;
              }
            }
            if (patient.status === 'Admitted') {
              const monthIdx = patient.admissionDate ? new Date(patient.admissionDate).getMonth() : -1;
              if (monthIdx >= 0) summary[monthIdx].active += 1;
            }
          });

          return summary;
        }, [patients]);

        const resetForm = () => {
          setEditingPatient(null);
          setFormData({
            name: '',
            uhid: '',
            dob: '',
            admissionDate: '',
            unit: 'NICU',
            admissionType: 'Direct',
            diagnosis: DIAGNOSIS_OPTIONS[0],
            status: STATUS_OPTIONS[0].value,
            outcomeDate: '',
            notes: ''
          });
        };

        const openNewModal = () => {
          resetForm();
          setIsModalOpen(true);
        };

        const openEditModal = patient => {
          setEditingPatient(patient);
          setFormData({
            name: patient.name || '',
            uhid: patient.uhid || '',
            dob: patient.dob || '',
            admissionDate: patient.admissionDate || '',
            unit: patient.unit || 'NICU',
            admissionType: patient.admissionType || 'Direct',
            diagnosis: patient.diagnosis || DIAGNOSIS_OPTIONS[0],
            status: patient.status || STATUS_OPTIONS[0].value,
            outcomeDate: patient.outcomeDate || '',
            notes: patient.notes || ''
          });
          setIsModalOpen(true);
        };

        const closeModal = () => {
          setIsModalOpen(false);
          resetForm();
        };

        const handleFormChange = event => {
          const { name, value } = event.target;
          setFormData(current => ({ ...current, [name]: value }));
        };

        const savePatient = async event => {
          event.preventDefault();
          if (!firebaseRef.current?.db) return;
          const payload = {
            ...formData,
            updatedAt: new Date().toISOString(),
          };
          if (!payload.outcomeDate && payload.status !== 'Admitted') {
            payload.outcomeDate = new Date().toISOString().slice(0, 10);
          }
          if (editingPatient?.id) {
            await firebaseRef.current.db.collection('patients').doc(editingPatient.id).set(payload, { merge: true });
          } else {
            payload.createdAt = new Date().toISOString();
            await firebaseRef.current.db.collection('patients').add(payload);
          }
          closeModal();
        };

        const deletePatient = async patientId => {
          if (!firebaseRef.current?.db || !window.confirm('Delete this record?')) return;
          await firebaseRef.current.db.collection('patients').doc(patientId).delete();
        };

        return (
          <div className="min-h-screen">
            <header className="bg-slate-900 text-white">
              <div className="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
                <div>
                  <p className="text-sm uppercase tracking-[0.2em] text-slate-300">Rajendra Institute of Medical Sciences</p>
                  <h1 className="text-3xl font-bold">RIMS NICU Tracker</h1>
                  <p className="mt-2 max-w-2xl text-slate-300">Live neonatal admissions, outcomes, and monthly reporting in one dashboard.</p>
                </div>
                <div className="rounded-xl bg-slate-800/70 px-4 py-3 text-sm text-slate-200 border border-slate-700">
                  <div>{user ? 'Connected to live Firebase data' : 'Connecting to Firebase...'}</div>
                  <div className="text-slate-400">Anonymous access enabled for tracker operations</div>
                </div>
              </div>
            </header>

            <main className="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8 space-y-8">
              {connectionError && (
                <div className="rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-amber-900 shadow-sm">
                  {connectionError}
                </div>
              )}

              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-6">
                <StatCard title="Total Patients" count={stats.total} emoji="👶" colorClass="bg-slate-100" />
                <StatCard title="Admitted" count={stats.admitted} emoji="🏥" colorClass="bg-blue-100" />
                <StatCard title="Discharged" count={stats.discharged} emoji="✅" colorClass="bg-green-100" />
                <StatCard title="Deaths" count={stats.died} emoji="🕊️" colorClass="bg-red-100" />
                <StatCard title="LAMA" count={stats.lama} emoji="↗️" colorClass="bg-orange-100" />
                <StatCard title="Transferred" count={stats.transferred} emoji="🚑" colorClass="bg-purple-100" />
              </div>

              <div className="flex flex-wrap gap-3 border-b border-slate-200 pb-4">
                <button
                  className={`rounded-full px-4 py-2 text-sm font-semibold ${activeTab === 'tracker' ? 'bg-slate-900 text-white' : 'bg-white text-slate-700 border border-slate-200'}`}
                  onClick={() => setActiveTab('tracker')}
                >
                  Tracker
                </button>
                <button
                  className={`rounded-full px-4 py-2 text-sm font-semibold ${activeTab === 'reports' ? 'bg-slate-900 text-white' : 'bg-white text-slate-700 border border-slate-200'}`}
                  onClick={() => setActiveTab('reports')}
                >
                  Monthly Report
                </button>
              </div>

              {activeTab === 'tracker' ? (
                <section className="space-y-6">
                  <div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                    <div className="flex flex-1 flex-col gap-4 sm:flex-row">
                      <input
                        type="search"
                        placeholder="Search by patient, UHID, unit, or diagnosis"
                        value={searchQuery}
                        onChange={event => setSearchQuery(event.target.value)}
                        className="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm focus:border-slate-400 focus:outline-none"
                      />
                      <select
                        value={filterStatus}
                        onChange={event => setFilterStatus(event.target.value)}
                        className="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm focus:border-slate-400 focus:outline-none"
                      >
                        <option value="All">All Statuses</option>
                        {STATUS_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}
                      </select>
                    </div>
                    <button
                      onClick={openNewModal}
                      className="rounded-xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-slate-800"
                    >
                      Add Patient
                    </button>
                  </div>

                  <div className="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
                    <div className="overflow-x-auto">
                      <table className="min-w-full divide-y divide-slate-200 text-sm">
                        <thead className="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
                          <tr>
                            <th className="px-4 py-3">Patient</th>
                            <th className="px-4 py-3">UHID</th>
                            <th className="px-4 py-3">Unit</th>
                            <th className="px-4 py-3">Diagnosis</th>
                            <th className="px-4 py-3">Age</th>
                            <th className="px-4 py-3">Status</th>
                            <th className="px-4 py-3">Admission</th>
                            <th className="px-4 py-3">Outcome</th>
                            <th className="px-4 py-3 text-right">Actions</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {isSyncing ? (
                            <tr>
                              <td className="px-4 py-10 text-center text-slate-500" colSpan="9">Connecting to live tracker…</td>
                            </tr>
                          ) : filteredPatients.length === 0 ? (
                            <tr>
                              <td className="px-4 py-10 text-center text-slate-500" colSpan="9">No patient records match the current filters.</td>
                            </tr>
                          ) : filteredPatients.map(patient => {
                            const hours = calculateHoursBetween(patient.dob, patient.status === 'Admitted' ? new Date().toISOString() : patient.outcomeDate);
                            return (
                              <tr key={patient.id} className="hover:bg-slate-50/80">
                                <td className="px-4 py-4 font-medium text-slate-800">{patient.name || 'Unnamed patient'}</td>
                                <td className="px-4 py-4 text-slate-600">{patient.uhid || '—'}</td>
                                <td className="px-4 py-4 text-slate-600">{patient.unit || 'NICU'}</td>
                                <td className="px-4 py-4 text-slate-600">{patient.diagnosis || '—'}</td>
                                <td className="px-4 py-4 text-slate-600">{formatAgeString(hours)}</td>
                                <td className="px-4 py-4"><Badge status={patient.status} /></td>
                                <td className="px-4 py-4 text-slate-600">{patient.admissionDate || '—'}</td>
                                <td className="px-4 py-4 text-slate-600">{patient.outcomeDate || '—'}</td>
                                <td className="px-4 py-4">
                                  <div className="flex justify-end gap-2">
                                    <button onClick={() => openEditModal(patient)} className="rounded-lg border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-50">Edit</button>
                                    <button onClick={() => deletePatient(patient.id)} className="rounded-lg border border-red-200 px-3 py-2 text-xs font-semibold text-red-700 hover:bg-red-50">Delete</button>
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </section>
              ) : (
                <section className="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
                  <div className="border-b border-slate-200 px-6 py-4">
                    <h2 className="text-xl font-semibold text-slate-900">Monthly NICU Summary</h2>
                    <p className="mt-1 text-sm text-slate-500">Admissions, outcomes, and currently active patients by month.</p>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="min-w-full divide-y divide-slate-200 text-sm">
                      <thead className="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
                        <tr>
                          <th className="px-4 py-3">Month</th>
                          <th className="px-4 py-3">Admissions</th>
                          <th className="px-4 py-3">Discharges</th>
                          <th className="px-4 py-3">Deaths</th>
                          <th className="px-4 py-3">LAMA</th>
                          <th className="px-4 py-3">Transferred</th>
                          <th className="px-4 py-3">Active</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {monthSummary.map(row => (
                          <tr key={row.month}>
                            <td className="px-4 py-3 font-medium text-slate-800">{row.month}</td>
                            <td className="px-4 py-3 text-slate-600">{row.admission}</td>
                            <td className="px-4 py-3 text-slate-600">{row.discharge}</td>
                            <td className="px-4 py-3 text-slate-600">{row.death}</td>
                            <td className="px-4 py-3 text-slate-600">{row.lama}</td>
                            <td className="px-4 py-3 text-slate-600">{row.transferred}</td>
                            <td className="px-4 py-3 text-slate-600">{row.active}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </section>
              )}
            </main>

            {isModalOpen && (
              <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 px-4">
                <div className="w-full max-w-2xl rounded-2xl bg-white shadow-2xl">
                  <div className="flex items-center justify-between border-b border-slate-200 px-6 py-4">
                    <div>
                      <h2 className="text-xl font-semibold text-slate-900">{editingPatient ? 'Edit patient' : 'Add patient'}</h2>
                      <p className="text-sm text-slate-500">Update neonatal admission and outcome details.</p>
                    </div>
                    <button onClick={closeModal} className="rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-600">Close</button>
                  </div>
                  <form onSubmit={savePatient} className="grid gap-4 px-6 py-6 md:grid-cols-2">
                    <label className="grid gap-2 text-sm text-slate-700">
                      Patient name
                      <input required name="name" value={formData.name} onChange={handleFormChange} className="rounded-xl border border-slate-200 px-4 py-3" />
                    </label>
                    <label className="grid gap-2 text-sm text-slate-700">
                      UHID
                      <input required name="uhid" value={formData.uhid} onChange={handleFormChange} className="rounded-xl border border-slate-200 px-4 py-3" />
                    </label>
                    <label className="grid gap-2 text-sm text-slate-700">
                      Date of birth
                      <input type="datetime-local" required name="dob" value={formData.dob} onChange={handleFormChange} className="rounded-xl border border-slate-200 px-4 py-3" />
                    </label>
                    <label className="grid gap-2 text-sm text-slate-700">
                      Admission date
                      <input type="date" required name="admissionDate" value={formData.admissionDate} onChange={handleFormChange} className="rounded-xl border border-slate-200 px-4 py-3" />
                    </label>
                    <label className="grid gap-2 text-sm text-slate-700">
                      Unit
                      <select name="unit" value={formData.unit} onChange={handleFormChange} className="rounded-xl border border-slate-200 px-4 py-3">
                        <option>NICU</option>
                        <option>SNCU</option>
                      </select>
                    </label>
                    <label className="grid gap-2 text-sm text-slate-700">
                      Admission type
                      <select name="admissionType" value={formData.admissionType} onChange={handleFormChange} className="rounded-xl border border-slate-200 px-4 py-3">
                        <option>Direct</option>
                        <option>Referral</option>
                        <option>Inborn</option>
                        <option>Outborn</option>
                      </select>
                    </label>
                    <label className="grid gap-2 text-sm text-slate-700">
                      Diagnosis
                      <select name="diagnosis" value={formData.diagnosis} onChange={handleFormChange} className="rounded-xl border border-slate-200 px-4 py-3">
                        {DIAGNOSIS_OPTIONS.map(option => <option key={option} value={option}>{option}</option>)}
                      </select>
                    </label>
                    <label className="grid gap-2 text-sm text-slate-700">
                      Status
                      <select name="status" value={formData.status} onChange={handleFormChange} className="rounded-xl border border-slate-200 px-4 py-3">
                        {STATUS_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}
                      </select>
                    </label>
                    <label className="grid gap-2 text-sm text-slate-700 md:col-span-2">
                      Outcome date
                      <input type="date" name="outcomeDate" value={formData.outcomeDate} onChange={handleFormChange} className="rounded-xl border border-slate-200 px-4 py-3" />
                    </label>
                    <label className="grid gap-2 text-sm text-slate-700 md:col-span-2">
                      Notes
                      <textarea name="notes" value={formData.notes} onChange={handleFormChange} rows="3" className="rounded-xl border border-slate-200 px-4 py-3" />
                    </label>
                    <div className="md:col-span-2 flex justify-end gap-3">
                      <button type="button" onClick={closeModal} className="rounded-xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-700">Cancel</button>
                      <button type="submit" className="rounded-xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white">Save patient</button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
