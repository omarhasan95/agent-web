      function App() {
        const [theme, setTheme] = useTheme();
        const [viewMode, setViewMode] = useState("overview");
        const [chartRange, setChartRange] = useState("month");
        const [summaryRange, setSummaryRange] = useState("month");
        const [reportMonthFilter, setReportMonthFilter] = useState("All");
        const [reportYearFilter, setReportYearFilter] = useState("All");
        const [now, setNow] = useState(new Date());
        const [patients, setPatients] = useState([]);
        const [searchQuery, setSearchQuery] = useState("");
        const [filterStatus, setFilterStatus] = useState("All");
        const [user, setUser] = useState(null);
        const [isSyncing, setIsSyncing] = useState(true);
        const [connectionError, setConnectionError] = useState("");
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [editingPatient, setEditingPatient] = useState(null);
        const [lastSnapshotAt, setLastSnapshotAt] = useState("");
        const [formData, setFormData] = useState({
          name: "",
          uhid: "",
          sex: SEX_OPTIONS[0],
          dob: "",
          admissionDate: "",
          unit: "NICU",
          admissionType: "Direct",
          diagnosis: DIAGNOSIS_OPTIONS[0],
          status: STATUS_ORDER[0],
          outcomeDate: "",
          notes: ""
        });

        const firebaseRef = React.useRef(null);
        const workspaceRef = React.useRef(null);

        const scrollToWorkspace = () => {
          window.setTimeout(() => {
            workspaceRef.current?.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 80);
        };

        const openWorkspaceView = mode => {
          setViewMode(mode);
          scrollToWorkspace();
        };

        const printReportView = () => {
          setViewMode("reports");
          window.setTimeout(() => {
            workspaceRef.current?.scrollIntoView({ behavior: "smooth", block: "start" });
            window.setTimeout(() => window.print(), 220);
          }, 80);
        };

        useEffect(() => {
          const timer = window.setInterval(() => setNow(new Date()), 1000);
          return () => window.clearInterval(timer);
        }, []);

        useEffect(() => {
          let unsubscribeAuth = null;
          let unsubscribeSnap = null;
          try {
            const app = firebase.apps && firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            firebaseRef.current = { auth, db };

            auth.signInAnonymously().catch(error => console.error("Auth error:", error));
            unsubscribeAuth = auth.onAuthStateChanged(currentUser => {
              setUser(currentUser);
              if (!currentUser) {
                setConnectionError("Signed out from the live database. Reconnect to continue syncing.");
              } else {
                setConnectionError("");
              }
            });

            unsubscribeSnap = db.collection("patients").onSnapshot(
              snapshot => {
                const fetched = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                setPatients(fetched);
                setIsSyncing(false);
                setConnectionError("");
                setLastSnapshotAt(new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }));
              },
              error => {
                console.error("Data sync error:", error);
                setIsSyncing(false);
                setConnectionError("Live sync could not connect to Firestore. Check Firebase auth and rules.");
              }
            );
          } catch (error) {
            console.error("Firebase init error:", error);
            setIsSyncing(false);
            setConnectionError("Firebase failed to initialize in this browser.");
          }

          return () => {
            if (unsubscribeAuth) unsubscribeAuth();
            if (unsubscribeSnap) unsubscribeSnap();
          };
        }, []);

        const filteredPatients = useMemo(() => {
          const query = searchQuery.toLowerCase().trim();
          return [...patients]
            .filter(patient => {
              if (filterStatus !== "All" && patient.status !== filterStatus) return false;
              if (!query) return true;
              return [patient.name, patient.uhid, patient.sex, patient.unit, patient.diagnosis, patient.notes]
                .filter(Boolean)
                .some(value => String(value).toLowerCase().includes(query));
            })
            .sort((a, b) => {
              const aDate = toDate(a.admissionDate)?.getTime() || 0;
              const bDate = toDate(b.admissionDate)?.getTime() || 0;
              return bDate - aDate;
            });
        }, [patients, searchQuery, filterStatus]);

        const analytics = useMemo(() => {
          const now = new Date();
          const currentMonth = now.getMonth();
          const currentYear = now.getFullYear();
          const recentDays = getRecentDays();
          const recentMonths = getRecentMonths();
          const recentYears = getRecentYears();

          const activeCount = patients.filter(patient => patient.status === "Admitted").length;
          const dailyAdmissions = patients.filter(patient => {
            const date = toDate(patient.admissionDate);
            return date && date.getDate() === now.getDate() && date.getMonth() === currentMonth && date.getFullYear() === currentYear;
          }).length;
          const dailyOutcomes = patients.filter(patient => {
            const date = toDate(patient.outcomeDate);
            return date && date.getDate() === now.getDate() && date.getMonth() === currentMonth && date.getFullYear() === currentYear;
          }).length;
          const monthlyAdmissions = patients.filter(patient => {
            const date = toDate(patient.admissionDate);
            return date && date.getMonth() === currentMonth && date.getFullYear() === currentYear;
          }).length;
          const monthlyOutcomes = patients.filter(patient => {
            const date = toDate(patient.outcomeDate);
            return date && date.getMonth() === currentMonth && date.getFullYear() === currentYear;
          }).length;
          const yearlyAdmissions = patients.filter(patient => {
            const date = toDate(patient.admissionDate);
            return date && date.getFullYear() === currentYear;
          }).length;
          const yearlyOutcomes = patients.filter(patient => {
            const date = toDate(patient.outcomeDate);
            return date && date.getFullYear() === currentYear;
          }).length;
          const outcomeRecords = patients.filter(patient => patient.status !== "Admitted");
          const mortalityRate = outcomeRecords.length
            ? Math.round((outcomeRecords.filter(patient => patient.status === "Died").length / outcomeRecords.length) * 100)
            : 0;
          const averageStayHours = average(
            outcomeRecords.map(patient => diffHours(patient.dob, patient.outcomeDate)).filter(value => value && value > 0)
          );

          const monthTrend = recentMonths.map(item => {
            const admissions = patients.filter(patient => {
              const date = toDate(patient.admissionDate);
              return date && date.getMonth() === item.month && date.getFullYear() === item.year;
            }).length;
            const outcomes = patients.filter(patient => {
              const date = toDate(patient.outcomeDate);
              return date && date.getMonth() === item.month && date.getFullYear() === item.year;
            }).length;
            return { ...item, admissions, outcomes };
          });

          const dayTrend = recentDays.map(item => {
            const admissions = patients.filter(patient => {
              const date = toDate(patient.admissionDate);
              return date && date.getDate() === item.day && date.getMonth() === item.month && date.getFullYear() === item.year;
            }).length;
            const outcomes = patients.filter(patient => {
              const date = toDate(patient.outcomeDate);
              return date && date.getDate() === item.day && date.getMonth() === item.month && date.getFullYear() === item.year;
            }).length;
            return { ...item, admissions, outcomes };
          });

          const yearTrend = recentYears.map(item => {
            const admissions = patients.filter(patient => {
              const date = toDate(patient.admissionDate);
              return date && date.getFullYear() === item.year;
            }).length;
            const outcomes = patients.filter(patient => {
              const date = toDate(patient.outcomeDate);
              return date && date.getFullYear() === item.year;
            }).length;
            return { ...item, admissions, outcomes };
          });

          const diagnosisSummary = DIAGNOSIS_OPTIONS.map((diagnosis, index) => ({
            label: diagnosis,
            value: patients.filter(patient => (patient.diagnosis || "Others") === diagnosis).length,
            color: ["#7dc4f8", "#c8b7f8", "#9fe3f8", "#8fd9c8", "#f4c38e"][index]
          })).sort((a, b) => b.value - a.value);

          const statusSummary = STATUS_ORDER.map(status => ({
            label: STATUS_META[status].label,
            value: patients.filter(patient => patient.status === status).length,
            color: STATUS_META[status].tone
          }));

          const unitSummary = ["NICU", "SNCU"].map((unit, index) => ({
            label: unit,
            value: patients.filter(patient => (patient.unit || "NICU") === unit).length,
            color: index === 0 ? "#7dc4f8" : "#8fd9c8"
          }));

          const longestStay = outcomeRecords
            .map(patient => ({
              ...patient,
              stayHours: diffHours(patient.dob, patient.outcomeDate)
            }))
            .filter(patient => patient.stayHours && patient.stayHours > 0)
            .sort((a, b) => b.stayHours - a.stayHours)[0];

          const newestAdmission = [...patients]
            .filter(patient => toDate(patient.admissionDate))
            .sort((a, b) => toDate(b.admissionDate) - toDate(a.admissionDate))[0];

          const reportRows = recentMonths.map(item => {
            const admitted = patients.filter(patient => {
              const date = toDate(patient.admissionDate);
              return date && date.getMonth() === item.month && date.getFullYear() === item.year;
            });
            const outcomes = patients.filter(patient => {
              const date = toDate(patient.outcomeDate);
              return date && date.getMonth() === item.month && date.getFullYear() === item.year;
            });
            const nicuAdmissions = admitted.filter(patient => patient.unit === "NICU");
            const sncuAdmissions = admitted.filter(patient => patient.unit === "SNCU");
            const deaths = outcomes.filter(patient => patient.status === "Died");
            const deathsByDiagnosis = DIAGNOSIS_OPTIONS.reduce((acc, diagnosis) => {
              acc[diagnosis] = deaths.filter(patient => (patient.diagnosis || "Others") === diagnosis).length;
              return acc;
            }, {});
            const deathTimings = {
              lt24: deaths.filter(patient => {
                const hours = getOutcomeHours(patient);
                return hours !== null && hours < 24;
              }).length,
              d1to7: deaths.filter(patient => {
                const hours = getOutcomeHours(patient);
                return hours !== null && hours >= 24 && hours <= 24 * 7;
              }).length,
              d8to28: deaths.filter(patient => {
                const hours = getOutcomeHours(patient);
                return hours !== null && hours > 24 * 7 && hours <= 24 * 28;
              }).length,
              gt28: deaths.filter(patient => {
                const hours = getOutcomeHours(patient);
                return hours !== null && hours > 24 * 28;
              }).length
            };
            return {
              month: `${item.label} ${String(item.year).slice(-2)}`,
              monthLabel: item.label,
              monthIndex: item.month,
              year: item.year,
              admissions: admitted.length,
              nicu: nicuAdmissions.length,
              sncu: sncuAdmissions.length,
              discharged: outcomes.filter(patient => patient.status === "Discharged").length,
              death: outcomes.filter(patient => patient.status === "Died").length,
              lama: outcomes.filter(patient => patient.status === "LAMA").length,
              transferred: outcomes.filter(patient => patient.status === "Transferred").length,
              active: patients.filter(patient => {
                const date = toDate(patient.admissionDate);
                return patient.status === "Admitted" && date && date.getMonth() === item.month && date.getFullYear() === item.year;
              }).length,
              detail: {
                nicuDirect: nicuAdmissions.filter(patient => (patient.admissionType || "Direct") === "Direct").length,
                sncuTransferIn: sncuAdmissions.filter(patient => ["Transfer in", "Referral", "Outborn"].includes(patient.admissionType || "")).length,
                totalAdmissions: admitted.length,
                nicuDeathTA: nicuAdmissions.length,
                nicuDeathCount: deaths.filter(patient => patient.unit === "NICU").length,
                sncuDeathTA: sncuAdmissions.length,
                sncuDeathCount: deaths.filter(patient => patient.unit === "SNCU").length,
                nicuDischargeTA: nicuAdmissions.length,
                nicuDischargeCount: outcomes.filter(patient => patient.unit === "NICU" && patient.status === "Discharged").length,
                sncuDischargeTA: sncuAdmissions.length,
                sncuDischargeCount: outcomes.filter(patient => patient.unit === "SNCU" && patient.status === "Discharged").length,
                lamaTA: admitted.length,
                lamaCount: outcomes.filter(patient => patient.status === "LAMA").length,
                transferTA: admitted.length,
                transferCount: outcomes.filter(patient => patient.status === "Transferred").length,
                deathsByDiagnosis,
                deathTimings
              }
            };
          });

          return {
            total: patients.length,
            activeCount,
            dailyAdmissions,
            dailyOutcomes,
            monthlyAdmissions,
            monthlyOutcomes,
            yearlyAdmissions,
            yearlyOutcomes,
            mortalityRate,
            averageStayHours,
            dayTrend,
            monthTrend,
            yearTrend,
            diagnosisSummary,
            statusSummary,
            unitSummary,
            longestStay,
            newestAdmission,
            reportRows
          };
        }, [patients]);

        const chartData = chartRange === "day"
          ? analytics.dayTrend
          : chartRange === "year"
            ? analytics.yearTrend
            : analytics.monthTrend;

        const chartDescription = chartRange === "day"
          ? "Daily movement across the last 7 days."
          : chartRange === "year"
            ? "Year-wise admissions and outcomes across the last 5 years."
            : "Month-wise movement across the last 6 months.";

        const summaryStats = summaryRange === "day"
          ? [
              { value: analytics.activeCount, label: "admitted now" },
              { value: analytics.dailyAdmissions, label: "today admissions" },
              { value: analytics.dailyOutcomes, label: "today outcomes" }
            ]
          : summaryRange === "year"
            ? [
                { value: analytics.activeCount, label: "admitted now" },
                { value: analytics.yearlyAdmissions, label: "this year" },
                { value: analytics.yearlyOutcomes, label: "year outcomes" }
              ]
            : [
                { value: analytics.activeCount, label: "admitted now" },
                { value: analytics.monthlyAdmissions, label: "this month" },
                { value: analytics.monthlyOutcomes, label: "outcomes logged" }
              ];

        const reportYears = useMemo(
          () => [...new Set(analytics.reportRows.map(row => row.year))].sort((a, b) => b - a),
          [analytics.reportRows]
        );

        const filteredReportRows = useMemo(
          () => analytics.reportRows.filter(row => {
            if (reportYearFilter !== "All" && String(row.year) !== reportYearFilter) return false;
            if (reportMonthFilter !== "All" && row.monthLabel !== reportMonthFilter) return false;
            return true;
          }),
          [analytics.reportRows, reportMonthFilter, reportYearFilter]
        );

        const resetForm = () => {
          setEditingPatient(null);
          setFormData({
            name: "",
            uhid: "",
            sex: SEX_OPTIONS[0],
            dob: "",
            admissionDate: "",
            unit: "NICU",
            admissionType: "Direct",
            diagnosis: DIAGNOSIS_OPTIONS[0],
            status: STATUS_ORDER[0],
            outcomeDate: "",
            notes: ""
          });
        };

        const openNewModal = () => {
          resetForm();
          setIsModalOpen(true);
        };

        const openEditModal = patient => {
          setEditingPatient(patient);
          setFormData({
            name: patient.name || "",
            uhid: patient.uhid || "",
            sex: patient.sex || SEX_OPTIONS[0],
            dob: patient.dob || "",
            admissionDate: patient.admissionDate || "",
            unit: patient.unit || "NICU",
            admissionType: patient.admissionType || "Direct",
            diagnosis: patient.diagnosis || DIAGNOSIS_OPTIONS[0],
            status: patient.status || STATUS_ORDER[0],
            outcomeDate: patient.outcomeDate || "",
            notes: patient.notes || ""
          });
          setIsModalOpen(true);
        };

        const closeModal = () => {
          setIsModalOpen(false);
          resetForm();
        };

        const handleFormChange = event => {
          const { name, value } = event.target;
          setFormData(current => ({ ...current, [name]: value }));
        };

        const savePatient = async event => {
          event.preventDefault();
          if (!firebaseRef.current?.db) return;
          const payload = {
            ...formData,
            updatedAt: new Date().toISOString()
          };
          if (!payload.outcomeDate && payload.status !== "Admitted") {
            payload.outcomeDate = new Date().toISOString().slice(0, 10);
          }
          if (editingPatient?.id) {
            await firebaseRef.current.db.collection("patients").doc(editingPatient.id).set(payload, { merge: true });
          } else {
            payload.createdAt = new Date().toISOString();
            await firebaseRef.current.db.collection("patients").add(payload);
          }
          closeModal();
        };

        const deletePatient = async patientId => {
          if (!firebaseRef.current?.db) return;
          if (!window.confirm("Delete this patient record?")) return;
          await firebaseRef.current.db.collection("patients").doc(patientId).delete();
        };

        return (
          <div className="app-shell">
            <div className="page">
              <section className="hero fade-in">
                <div className="hero-grid">
                  <div className="header-stack top-strip">
                    <div className="hero-topline">
                      <div className="hero-kicker-group">
                        <div className="hero-kicker">
                          <Icon size={16}><path d="M3 12h4l2.5-5 4 10 2.5-5H21"></path></Icon>
                          Rajendra Institute of Medical Sciences
                        </div>
                        <button type="button" className="top-add-button" onClick={openNewModal} aria-label="Add patient">
                          <Icon size={18}><path d="M12 5v14"></path><path d="M5 12h14"></path></Icon>
                        </button>
                      </div>
                      <div className="section-nav" aria-label="Jump to section">
                        {VIEW_MODES.map(mode => (
                          <button
                            key={mode}
                            type="button"
                            className={`mini-tab ${viewMode === mode ? "active" : ""}`}
                            onClick={() => openWorkspaceView(mode)}
                          >
                            {mode === "overview" ? "Overview" : mode === "tracker" ? "Live Tracker" : "Monthly Report"}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="hero-mainline">
                      <div className="hero-intro">
                        <h1 className="hero-title">RIMS NICU Tracker</h1>
                        <p className="hero-copy">
                          Live admissions, patient status, and monthly NICU reporting in one compact workspace.
                        </p>
                      </div>
                      <div className="hero-summary-block">
                        <div className="summary-filter-group" aria-label="Top summary time filter">
                          {SUMMARY_RANGES.map(range => (
                            <button
                              key={range}
                              type="button"
                              className={`summary-filter-button ${summaryRange === range ? "active" : ""}`}
                              onClick={() => setSummaryRange(range)}
                            >
                              {range}
                            </button>
                          ))}
                        </div>
                        <div className="hero-summary" aria-label="Quick stats">
                          {summaryStats.map(item => (
                            <div key={item.label} className="summary-chip">
                              <strong>{item.value}</strong>
                              <span>{item.label}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="hero-side">
                    <div className="hero-panel">
                      <div className="control-cluster">
                        <div className="metric-eyebrow">Display</div>
                        <ThemeToggle theme={theme} setTheme={setTheme} />
                      </div>
                      <div className="hero-support-grid">
                        <ClockCard now={now} />
                        <SyncIndicator
                          isSyncing={isSyncing}
                          user={user}
                          connectionError={connectionError}
                          lastUpdated={lastSnapshotAt ? `${lastSnapshotAt}` : ""}
                          compact
                        />
                      </div>
                      <StatusDoughnut items={analytics.statusSummary} total={analytics.total} compact />
                      <div className="hero-actions">
                        <button type="button" className="pill-button" onClick={openNewModal}>Add Patient</button>
                        <button type="button" className="ghost-button" onClick={() => openWorkspaceView("tracker")}>Open Tracker</button>
                        <button type="button" className="ghost-button" onClick={printReportView}>Print Report</button>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              {connectionError && (
                <div className="notice fade-in">{connectionError}</div>
              )}

              <section ref={workspaceRef} className="analytics-grid section-anchor">
                <div className="span-12 surface">
                  <div className="surface-inner">
                    <div className="split-header">
                      <div>
                        <h2 className="panel-title">Clinical snapshot</h2>
                        <p className="panel-copy">Overview, tracker, and monthly reporting arranged so the most useful information stays visible first.</p>
                      </div>
                      <div className="tab-group">
                        {VIEW_MODES.map(mode => (
                          <button key={mode} type="button" className={`tab ${viewMode === mode ? "active" : ""}`} onClick={() => setViewMode(mode)}>
                            {mode === "overview" ? "Overview" : mode === "tracker" ? "Tracker" : "Reports"}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div className="metric-grid">
                      <MetricCard eyebrow="Total Records" value={analytics.total} subcopy="All neonatal records currently available in Firebase." />
                      <MetricCard eyebrow="Active Cases" value={analytics.activeCount} subcopy="Babies still admitted and being actively tracked." />
                      <MetricCard eyebrow="This Month" value={analytics.monthlyAdmissions} subcopy="Fresh admissions recorded in the current calendar month." />
                      <MetricCard eyebrow="Average Stay" value={`${Math.round(analytics.averageStayHours || 0)}h`} subcopy="Mean duration from birth to logged outcome among completed cases." />
                    </div>
                  </div>
                </div>

                <div className="span-7 surface">
                  <div className="surface-inner">
                    <div className="split-header">
                      <div>
                        <h3 className="panel-title">Admissions vs outcomes</h3>
                        <p className="panel-copy">{chartDescription}</p>
                      </div>
                      <div className="chart-filter-group" aria-label="Chart time filter">
                        {CHART_RANGES.map(range => (
                          <button
                            key={range}
                            type="button"
                            className={`chart-filter-button ${chartRange === range ? "active" : ""}`}
                            onClick={() => setChartRange(range)}
                          >
                            {range}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div className="chart-meta">
                      <span className="legend"><span className="legend-swatch" style={{ background: "#7dc4f8" }}></span>Admissions</span>
                      <span className="legend"><span className="legend-swatch" style={{ background: "#f4aecb" }}></span>Outcomes</span>
                    </div>
                    <LineAreaChart data={chartData} />
                  </div>
                </div>

                <div className="span-4 surface">
                  <div className="surface-inner">
                    <h3 className="panel-title">Diagnosis mix</h3>
                    <p className="panel-copy">Quick view of major clinical categories being handled.</p>
                    <DiagnosisBars items={analytics.diagnosisSummary} />
                  </div>
                </div>

                <div className="span-4 surface">
                  <div className="surface-inner">
                    <h3 className="panel-title">Unit load</h3>
                    <p className="panel-copy">How the active database is split between NICU and SNCU.</p>
                    <OutcomeSpark items={analytics.unitSummary} />
                  </div>
                </div>

                <div className="span-4 surface">
                  <div className="surface-inner">
                    <h3 className="panel-title">Key observations</h3>
                    <p className="panel-copy">Short insights generated from the live data stream.</p>
                    <div className="insight-list">
                      <div className="insight-item">
                        <div>
                          <strong>Newest admission</strong>
                          <div className="meta-text">
                            {analytics.newestAdmission
                              ? `${analytics.newestAdmission.name || "Unnamed patient"} on ${formatDateLabel(analytics.newestAdmission.admissionDate)}`
                              : "No admissions yet"}
                          </div>
                        </div>
                      </div>
                      <div className="insight-item">
                        <div>
                          <strong>Longest logged stay</strong>
                          <div className="meta-text">
                            {analytics.longestStay
                              ? `${analytics.longestStay.name || "Unnamed patient"} stayed ${Math.round(analytics.longestStay.stayHours)}h`
                              : "Not enough closed cases yet"}
                          </div>
                        </div>
                      </div>
                      <div className="insight-item">
                        <div>
                          <strong>Highest diagnosis count</strong>
                          <div className="meta-text">
                            {analytics.diagnosisSummary[0]
                              ? `${analytics.diagnosisSummary[0].label} leads with ${analytics.diagnosisSummary[0].value} cases`
                              : "No diagnosis data yet"}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="span-12 surface">
                  <div className="surface-inner">
                    <div className="split-header">
                      <div>
                        <h3 className="panel-title">{viewMode === "reports" ? "Printable monthly report table" : "Patient workspace"}</h3>
                        <p className="panel-copy">
                          {viewMode === "reports"
                            ? "Detailed month-wise admissions, deaths, discharge, LAMA, transfer out, cause of death, and death timing."
                            : "Search, filter, review, and update individual patient records with DOL shown in days and hours."}
                        </p>
                      </div>
                      <div className="report-actions">
                        {viewMode === "reports" ? (
                          <button type="button" className="print-button" onClick={() => window.print()}>Print This Report</button>
                        ) : (
                          <button type="button" className="solid-button" onClick={openNewModal}>Add patient</button>
                        )}
                      </div>
                    </div>

                    {viewMode !== "reports" && (
                      <div className="toolbar" style={{ marginBottom: 18 }}>
                        <input
                          className="field"
                          type="search"
                          placeholder="Search by patient name, UHID, sex, unit, diagnosis, or note"
                          value={searchQuery}
                          onChange={event => setSearchQuery(event.target.value)}
                        />
                        <select className="select-field" value={filterStatus} onChange={event => setFilterStatus(event.target.value)}>
                          <option value="All">All statuses</option>
                          {STATUS_ORDER.map(status => (
                            <option key={status} value={status}>{STATUS_META[status].label}</option>
                          ))}
                        </select>
                        <button type="button" className="small-button" onClick={() => setViewMode(viewMode === "overview" ? "tracker" : "overview") }>
                          {viewMode === "overview" ? "Focus Tracker" : "Back to Overview"}
                        </button>
                      </div>
                    )}

                    {viewMode === "reports" ? (
                      <>
                        <div className="report-filter-row">
                          <select className="select-field" value={reportMonthFilter} onChange={event => setReportMonthFilter(event.target.value)}>
                            <option value="All">All months</option>
                            {MONTHS.map(month => (
                              <option key={month} value={month}>{month}</option>
                            ))}
                          </select>
                          <select className="select-field" value={reportYearFilter} onChange={event => setReportYearFilter(event.target.value)}>
                            <option value="All">All years</option>
                            {reportYears.map(year => (
                              <option key={year} value={String(year)}>{year}</option>
                            ))}
                          </select>
                          <button type="button" className="small-button" onClick={() => { setReportMonthFilter("All"); setReportYearFilter("All"); }}>
                            Clear report filters
                          </button>
                        </div>
                      <div className="patient-table-wrap">
                        <table className="report-table">
                          <thead>
                            <tr>
                              <th rowSpan="3">Month</th>
                              <th colSpan="3">Total No of Admission (NICU + SNCU)</th>
                              <th colSpan="4">Total No of Death</th>
                              <th colSpan="4">Discharge</th>
                              <th colSpan="2">LAMA</th>
                              <th colSpan="2">Transfer Out</th>
                              <th colSpan="5">Cause of Death (T.A / Death)</th>
                              <th colSpan="4">Death Timing</th>
                            </tr>
                            <tr>
                              <th rowSpan="2">NICU Direct</th>
                              <th rowSpan="2">SNCU Transfer in</th>
                              <th rowSpan="2">Total</th>
                              <th colSpan="2">NICU</th>
                              <th colSpan="2">SNCU</th>
                              <th colSpan="2">NICU</th>
                              <th colSpan="2">SNCU</th>
                              <th rowSpan="2">T.A</th>
                              <th rowSpan="2">Death</th>
                              <th rowSpan="2">T.A</th>
                              <th rowSpan="2">Death</th>
                              <th rowSpan="2">Pre Term</th>
                              <th rowSpan="2">Severe Birth Asphyxia</th>
                              <th rowSpan="2">SEPSIS</th>
                              <th rowSpan="2">RDS</th>
                              <th rowSpan="2">Others</th>
                              <th rowSpan="2">&lt;24 hrs</th>
                              <th rowSpan="2">24h - 7d</th>
                              <th rowSpan="2">8d - 28d</th>
                              <th rowSpan="2">&gt;28d</th>
                            </tr>
                            <tr>
                              <th>T.A</th>
                              <th>Death</th>
                              <th>T.A</th>
                              <th>Death</th>
                              <th>T.A</th>
                              <th>Death</th>
                              <th>T.A</th>
                              <th>Death</th>
                            </tr>
                          </thead>
                          <tbody>
                            {filteredReportRows.length === 0 ? (
                              <tr>
                                <td colSpan="25" className="empty-state">No monthly report rows match the selected filters.</td>
                              </tr>
                            ) : (
                              filteredReportRows.map(row => (
                                <tr key={row.month}>
                                  <td className="patient-name">{row.month}</td>
                                  <td>{row.detail.nicuDirect}</td>
                                  <td>{row.detail.sncuTransferIn}</td>
                                  <td>{row.detail.totalAdmissions}</td>
                                  <td>{row.detail.nicuDeathTA}</td>
                                  <td>{row.detail.nicuDeathCount}</td>
                                  <td>{row.detail.sncuDeathTA}</td>
                                  <td>{row.detail.sncuDeathCount}</td>
                                  <td>{row.detail.nicuDischargeTA}</td>
                                  <td>{row.detail.nicuDischargeCount}</td>
                                  <td>{row.detail.sncuDischargeTA}</td>
                                  <td>{row.detail.sncuDischargeCount}</td>
                                  <td>{row.detail.lamaTA}</td>
                                  <td>{row.detail.lamaCount}</td>
                                  <td>{row.detail.transferTA}</td>
                                  <td>{row.detail.transferCount}</td>
                                  <td>{row.detail.deathsByDiagnosis["Pre Term"]}</td>
                                  <td>{row.detail.deathsByDiagnosis["Severe Birth Asphyxia"]}</td>
                                  <td>{row.detail.deathsByDiagnosis["SEPSIS"]}</td>
                                  <td>{row.detail.deathsByDiagnosis["RDS"]}</td>
                                  <td>{row.detail.deathsByDiagnosis["Others"]}</td>
                                  <td>{row.detail.deathTimings.lt24}</td>
                                  <td>{row.detail.deathTimings.d1to7}</td>
                                  <td>{row.detail.deathTimings.d8to28}</td>
                                  <td>{row.detail.deathTimings.gt28}</td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                      </>
                    ) : (
                      <div className="patient-table-wrap">
                        <table>
                          <thead>
                            <tr>
                              <th>Patient</th>
                              <th>UHID</th>
                              <th>Sex</th>
                              <th>Unit</th>
                              <th>Diagnosis</th>
                              <th>Age</th>
                              <th>Status</th>
                              <th>Admission</th>
                              <th>Outcome</th>
                              <th>Actions</th>
                            </tr>
                          </thead>
                          <tbody>
                            {isSyncing ? (
                              <tr>
                                <td colSpan="10" className="empty-state">Connecting to live tracker...</td>
                              </tr>
                            ) : filteredPatients.length === 0 ? (
                              <tr>
                                <td colSpan="10" className="empty-state">No patient records match the current filters.</td>
                              </tr>
                            ) : (
                              filteredPatients.map(patient => {
                                const hours = diffHours(
                                  patient.dob,
                                  patient.status === "Admitted" ? new Date().toISOString() : patient.outcomeDate
                                );
                                return (
                                  <tr key={patient.id}>
                                    <td>
                                      <div className="patient-name">{patient.name || "Unnamed patient"}</div>
                                      <div className="meta-text">{patient.admissionType || "Direct"}</div>
                                    </td>
                                    <td>{patient.uhid || "—"}</td>
                                    <td>{patient.sex || "—"}</td>
                                    <td>{patient.unit || "NICU"}</td>
                                    <td>{patient.diagnosis || "Others"}</td>
                                    <td>{formatAge(hours)}</td>
                                    <td><StatusBadge status={patient.status} /></td>
                                    <td>{formatShortDate(patient.admissionDate)}</td>
                                    <td>{patient.outcomeDate ? formatShortDate(patient.outcomeDate) : "—"}</td>
                                    <td>
                                      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                                        <button type="button" className="small-button" onClick={() => openEditModal(patient)}>Edit</button>
                                        <button type="button" className="small-button danger" onClick={() => deletePatient(patient.id)}>Delete</button>
                                      </div>
                                    </td>
                                  </tr>
                                );
                              })
                            )}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                </div>
              </section>

              {isModalOpen && (
                <div className="modal-backdrop" onClick={closeModal}>
                  <div className="modal fade-in" onClick={event => event.stopPropagation()}>
                    <div className="modal-head">
                      <div>
                        <h3 className="panel-title">{editingPatient ? "Edit patient record" : "Add patient record"}</h3>
                        <p className="panel-copy">Update live clinical data without leaving the dashboard.</p>
                      </div>
                      <button type="button" className="icon-button" onClick={closeModal} aria-label="Close modal">
                        <Icon><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></Icon>
                      </button>
                    </div>
                    <form onSubmit={savePatient}>
                      <div className="modal-body">
                        <label className="field-group">
                          <span className="field-label">Patient name</span>
                          <input className="field" required name="name" value={formData.name} onChange={handleFormChange} />
                        </label>
                        <label className="field-group">
                          <span className="field-label">UHID</span>
                          <input className="field" required name="uhid" value={formData.uhid} onChange={handleFormChange} />
                        </label>
                        <label className="field-group">
                          <span className="field-label">Date of birth</span>
                          <input className="field" type="datetime-local" required name="dob" value={formData.dob} onChange={handleFormChange} />
                        </label>
                        <label className="field-group">
                          <span className="field-label">Sex</span>
                          <select className="select-field" required name="sex" value={formData.sex} onChange={handleFormChange}>
                            {SEX_OPTIONS.map(option => <option key={option} value={option}>{option}</option>)}
                          </select>
                        </label>
                        <label className="field-group">
                          <span className="field-label">Admission date</span>
                          <input className="field" type="date" required name="admissionDate" value={formData.admissionDate} onChange={handleFormChange} />
                        </label>
                        <label className="field-group">
                          <span className="field-label">Unit</span>
                          <select className="select-field" name="unit" value={formData.unit} onChange={handleFormChange}>
                            <option value="NICU">NICU</option>
                            <option value="SNCU">SNCU</option>
                          </select>
                        </label>
                        <label className="field-group">
                          <span className="field-label">Admission type</span>
                          <select className="select-field" name="admissionType" value={formData.admissionType} onChange={handleFormChange}>
                            <option value="Direct">Direct</option>
                            <option value="Referral">Referral</option>
                            <option value="Inborn">Inborn</option>
                            <option value="Outborn">Outborn</option>
                          </select>
                        </label>
                        <label className="field-group">
                          <span className="field-label">Diagnosis</span>
                          <select className="select-field" name="diagnosis" value={formData.diagnosis} onChange={handleFormChange}>
                            {DIAGNOSIS_OPTIONS.map(option => <option key={option} value={option}>{option}</option>)}
                          </select>
                        </label>
                        <label className="field-group">
                          <span className="field-label">Status</span>
                          <select className="select-field" name="status" value={formData.status} onChange={handleFormChange}>
                            {STATUS_ORDER.map(status => <option key={status} value={status}>{STATUS_META[status].label}</option>) }
                          </select>
                        </label>
                        <label className="field-group full">
                          <span className="field-label">Outcome date</span>
                          <input className="field" type="date" name="outcomeDate" value={formData.outcomeDate} onChange={handleFormChange} />
                        </label>
                        <label className="field-group full">
                          <span className="field-label">Notes</span>
                          <textarea className="textarea-field" rows="4" name="notes" value={formData.notes} onChange={handleFormChange}></textarea>
                        </label>
                      </div>
                      <div className="modal-foot">
                        <button type="button" className="small-button" onClick={closeModal}>Cancel</button>
                        <button type="submit" className="solid-button">Save patient</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
