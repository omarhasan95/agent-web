<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RIMS NICU Tracker for live neonatal admissions, outcomes, analytics, and monthly reporting."
    />
    <title>RIMS NICU Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
      :root {
        --bg: #fff6fb;
        --bg-elevated: rgba(255, 255, 255, 0.92);
        --bg-strong: #ffffff;
        --bg-soft: #eef7ff;
        --bg-accent: #7586bd;
        --text: #314258;
        --text-soft: #6b7a92;
        --text-faint: #8795ae;
        --line: rgba(181, 197, 228, 0.42);
        --line-strong: rgba(160, 183, 221, 0.52);
        --shadow: 0 18px 42px rgba(152, 176, 214, 0.18);
        --shadow-soft: 0 10px 26px rgba(166, 191, 226, 0.14);
        --blue: #7dc4f8;
        --indigo: #94a6e8;
        --cyan: #9fe3f8;
        --emerald: #8fd9c8;
        --amber: #f4c38e;
        --rose: #f4aecb;
        --violet: #c8b7f8;
        --surface-radius: 18px;
      }

      body.dark {
        --bg: #1b2131;
        --bg-elevated: rgba(31, 40, 61, 0.95);
        --bg-strong: #25304a;
        --bg-soft: #2d3b59;
        --bg-accent: #dbe6ff;
        --text: #f4f7ff;
        --text-soft: #c7d2eb;
        --text-faint: #9fb0cf;
        --line: rgba(168, 186, 225, 0.18);
        --line-strong: rgba(168, 186, 225, 0.3);
        --shadow: 0 18px 36px rgba(8, 12, 22, 0.34);
        --shadow-soft: 0 10px 24px rgba(8, 12, 22, 0.26);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Plus Jakarta Sans", sans-serif;
        transition: background 240ms ease, color 240ms ease;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
        border: 0;
      }

      #root {
        min-height: 100vh;
      }

      .app-shell {
        min-height: 100vh;
        padding: 24px;
      }

      .page {
        max-width: 1480px;
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }

      .hero {
        border-radius: 24px;
        background:
          linear-gradient(135deg, rgba(244, 174, 203, 0.16), rgba(157, 223, 248, 0.18)),
          var(--bg-strong);
        color: var(--text);
        padding: 18px;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(520px, 0.8fr);
        gap: 14px;
        align-items: center;
      }

      .top-strip {
        margin-bottom: 0;
        padding: 18px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }

      .header-stack {
        display: grid;
        gap: 12px;
      }

      .hero-topline,
      .hero-mainline {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px 16px;
      }

      .hero-kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 7px 11px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--line);
        font-size: 11px;
        font-weight: 700;
        color: var(--text-soft);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .hero-title {
        margin: 0;
        font-size: clamp(28px, 3.2vw, 36px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .hero-intro {
        display: grid;
        gap: 8px;
      }

      .hero-summary-block {
        display: grid;
        gap: 10px;
        justify-items: end;
        min-width: 0;
      }

      .hero-copy {
        max-width: 520px;
        margin: 0;
        font-size: 15px;
        line-height: 1.6;
        color: var(--text-soft);
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        width: 100%;
        justify-content: flex-end;
      }

      .hero-summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(92px, 1fr));
        gap: 10px;
        min-width: min(100%, 320px);
      }

      .summary-filter-group {
        display: inline-flex;
        gap: 6px;
        padding: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--line);
      }

      .summary-filter-button {
        padding: 7px 12px;
        border-radius: 999px;
        background: transparent;
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 700;
        text-transform: capitalize;
      }

      .summary-filter-button.active {
        background: linear-gradient(135deg, rgba(244, 174, 203, 0.22), rgba(157, 223, 248, 0.22));
        color: var(--text);
      }

      .summary-chip {
        min-width: 0;
        padding: 14px 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .summary-chip strong {
        display: block;
        font-size: 20px;
        line-height: 1;
        margin-bottom: 4px;
      }

      .summary-chip span {
        font-size: 12px;
        color: var(--text-soft);
      }

      .summary-chip:nth-child(1) {
        background: linear-gradient(135deg, rgba(244, 174, 203, 0.22), rgba(255, 255, 255, 0.9));
      }

      .summary-chip:nth-child(2) {
        background: linear-gradient(135deg, rgba(157, 223, 248, 0.24), rgba(255, 255, 255, 0.9));
      }

      .summary-chip:nth-child(3) {
        background: linear-gradient(135deg, rgba(200, 183, 248, 0.24), rgba(255, 255, 255, 0.9));
      }

      .hero-side {
        display: grid;
        gap: 0;
      }

      .hero-panel {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        justify-content: flex-end;
        gap: 10px;
        padding: 14px 16px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        background: rgba(255, 255, 255, 0.76);
      }

      .hero-side .status-card,
      .hero-side .clock-card {
        padding: 12px 14px;
        border-radius: 18px;
      }

      .hero-side .panel-copy,
      .hero-side .clock-meta {
        font-size: 12px;
      }

      .hero-side .sync-chip {
        padding: 8px 10px;
      }

      .hero-side .clock-card {
        gap: 4px;
      }

      .hero-side .clock-time {
        font-size: 18px;
      }

      .hero-side .metric-eyebrow {
        font-size: 11px;
        letter-spacing: 0.1em;
      }

      .hero-side .theme-toggle {
        padding: 4px;
      }

      .hero-side .theme-option {
        padding: 8px 10px;
      }

      .hero-side .control-cluster {
        justify-content: space-between;
      }

      .hero-side .control-cluster,
      .hero-side .hero-support-grid,
      .hero-side .status-mix-top,
      .hero-side .hero-actions {
        flex: 1 1 auto;
      }

      .compact-status {
        max-width: none;
      }

      .compact-status .panel-copy {
        margin-top: 8px;
      }

      .section-anchor {
        scroll-margin-top: 20px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .section-nav {
        display: inline-flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .hero-support-grid {
        display: grid;
        grid-template-columns: minmax(160px, auto) minmax(220px, 1fr);
        gap: 10px;
        align-items: center;
      }

      .hero-kicker-group {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .top-add-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--rose), var(--blue));
        color: white;
        box-shadow: 0 10px 22px rgba(163, 191, 232, 0.28);
      }

      .clock-card {
        display: grid;
        gap: 6px;
        padding: 16px;
        border-radius: 16px;
        background: var(--bg-strong);
        border: 1px solid var(--line);
      }

      .clock-time {
        font-size: clamp(26px, 4vw, 34px);
        font-weight: 800;
        line-height: 1;
      }

      .clock-meta {
        font-size: 13px;
        color: var(--text-soft);
      }

      .pill-button,
      .ghost-button,
      .solid-button,
      .small-button,
      .icon-button {
        border-radius: 18px;
        position: relative;
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
      }

      .pill-button:hover,
      .ghost-button:hover,
      .solid-button:hover,
      .small-button:hover,
      .icon-button:hover {
        transform: translateY(-1px);
      }

      .pill-button {
        padding: 12px 16px;
        background: linear-gradient(135deg, var(--rose), var(--blue));
        color: white;
        font-weight: 700;
        box-shadow: 0 12px 24px rgba(163, 191, 232, 0.28);
        white-space: nowrap;
      }

      .ghost-button {
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid var(--line);
        color: var(--text);
        font-weight: 600;
        white-space: nowrap;
      }

      .solid-button {
        padding: 12px 16px;
        background: linear-gradient(135deg, var(--blue), var(--cyan));
        color: white;
        font-weight: 700;
        box-shadow: 0 12px 24px rgba(125, 196, 248, 0.3);
        white-space: nowrap;
      }

      .small-button {
        padding: 10px 14px;
        background: var(--bg-soft);
        color: var(--text);
        border: 1px solid var(--line);
        font-weight: 600;
      }

      .small-button.danger {
        background: rgba(244, 63, 94, 0.09);
        color: #be123c;
        border-color: rgba(244, 63, 94, 0.18);
      }

      body.dark .small-button.danger {
        color: #fecdd3;
      }

      .icon-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        background: var(--bg-elevated);
        border: 1px solid var(--line);
        color: var(--text);
      }

      .control-cluster {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: flex-end;
      }

      .theme-toggle {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 6px;
        border-radius: 999px;
        background: var(--bg-strong);
        border: 1px solid var(--line);
      }

      .theme-option {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: transparent;
        color: var(--text-soft);
        font-size: 13px;
        font-weight: 700;
      }

      .theme-option.active {
        background: var(--bg-soft);
        color: var(--text);
      }

      .tab:focus-visible,
      .mini-tab:focus-visible,
      .theme-option:focus-visible,
      .pill-button:focus-visible,
      .ghost-button:focus-visible,
      .solid-button:focus-visible,
      .small-button:focus-visible,
      .icon-button:focus-visible {
        outline: 3px solid rgba(59, 130, 246, 0.2);
        outline-offset: 2px;
      }

      .tab:disabled,
      .mini-tab:disabled,
      .theme-option:disabled,
      .pill-button:disabled,
      .ghost-button:disabled,
      .solid-button:disabled,
      .small-button:disabled,
      .icon-button:disabled {
        cursor: not-allowed;
        opacity: 0.62;
        transform: none;
      }

      .status-panel {
        display: grid;
        gap: 14px;
      }

      .status-panel h3,
      .panel-title,
      .section-title {
        margin: 0;
        letter-spacing: 0;
      }

      .status-card {
        border-radius: 16px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid var(--line);
      }

      .sync-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--bg-soft);
        border: 1px solid var(--line);
      }

      .sync-dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--emerald);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.45);
        animation: pulse 1.8s infinite;
      }

      .sync-dot.offline {
        background: var(--amber);
        box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.45);
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.45);
        }
        70% {
          box-shadow: 0 0 0 18px rgba(16, 185, 129, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
      }

      .analytics-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 20px;
      }

      .surface {
        background: var(--bg-elevated);
        border: 1px solid var(--line);
        border-radius: var(--surface-radius);
        box-shadow: var(--shadow-soft);
      }

      .surface-inner {
        padding: 22px;
      }

      .span-12 {
        grid-column: span 12;
      }

      .span-8 {
        grid-column: span 8;
      }

      .span-7 {
        grid-column: span 7;
      }

      .span-6 {
        grid-column: span 6;
      }

      .span-5 {
        grid-column: span 5;
      }

      .span-4 {
        grid-column: span 4;
      }

      .span-3 {
        grid-column: span 3;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .metric-card {
        min-height: 132px;
        padding: 20px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--bg-strong);
      }

      body.dark .metric-card {
        background: var(--bg-strong);
      }

      .metric-eyebrow {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-faint);
      }

      .metric-value {
        margin: 12px 0 8px;
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 800;
      }

      .metric-subcopy {
        color: var(--text-soft);
        font-size: 14px;
        line-height: 1.6;
      }

      .split-header {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      .panel-title {
        font-size: 20px;
        font-weight: 800;
      }

      .panel-copy,
      .section-copy {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 14px;
        line-height: 1.6;
      }

      .tab-group {
        display: inline-flex;
        gap: 8px;
        padding: 6px;
        border-radius: 999px;
        background: var(--bg-strong);
        border: 1px solid var(--line);
      }

      .tab {
        padding: 11px 16px;
        border-radius: 999px;
        background: transparent;
        color: var(--text-soft);
        font-size: 13px;
        font-weight: 700;
      }

      .tab.active {
        background: linear-gradient(135deg, rgba(244, 174, 203, 0.26), rgba(157, 223, 248, 0.26));
        color: var(--text);
        box-shadow: 0 8px 20px rgba(177, 196, 231, 0.18);
      }

      .chart-filter-group {
        display: inline-flex;
        gap: 6px;
        padding: 4px;
        border-radius: 999px;
        background: var(--bg-strong);
        border: 1px solid var(--line);
      }

      .chart-filter-button {
        padding: 8px 12px;
        border-radius: 999px;
        background: transparent;
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 700;
        text-transform: capitalize;
      }

      .chart-filter-button.active {
        background: linear-gradient(135deg, rgba(244, 174, 203, 0.22), rgba(157, 223, 248, 0.22));
        color: var(--text);
      }

      .report-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      .report-filter-row {
        display: grid;
        grid-template-columns: 220px 220px auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .print-button {
        padding: 12px 16px;
        border-radius: 16px;
        background: var(--emerald);
        color: white;
        font-weight: 700;
        box-shadow: 0 12px 22px rgba(16, 185, 129, 0.18);
      }

      .report-table {
        min-width: 1780px;
      }

      .report-table th,
      .report-table td {
        padding: 10px 12px;
        font-size: 12px;
      }

      .report-table thead tr:first-child th {
        background: rgba(59, 130, 246, 0.11);
        color: var(--text);
      }

      .report-table thead tr:nth-child(2) th,
      .report-table thead tr:nth-child(3) th {
        background: rgba(148, 163, 184, 0.1);
      }

      .report-table td:first-child,
      .report-table th:first-child {
        position: sticky;
        left: 0;
        z-index: 1;
        background: var(--bg-strong);
      }

      .mini-tabs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .mini-tab {
        padding: 9px 12px;
        border-radius: 14px;
        background: var(--bg-strong);
        border: 1px solid var(--line);
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .mini-tab.active {
        background: linear-gradient(135deg, var(--rose), var(--blue));
        color: white;
      }

      .chart-frame {
        display: grid;
        gap: 14px;
      }

      .chart-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
      }

      .legend {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-soft);
      }

      .legend-swatch {
        width: 11px;
        height: 11px;
        border-radius: 999px;
      }

      .axis-labels {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
        gap: 8px;
        font-size: 12px;
        color: var(--text-faint);
      }

      .doughnut-wrap {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 20px;
        align-items: center;
      }

      .doughnut {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        position: relative;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      .doughnut::after {
        content: "";
        position: absolute;
        inset: 26px;
        border-radius: 50%;
        background: var(--bg-elevated);
        border: 1px solid var(--line);
      }

      .doughnut-center {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 1;
        text-align: center;
      }

      .doughnut-center strong {
        display: block;
        font-size: 34px;
      }

      .status-mix-top {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--bg-soft);
      }

      .status-mix-top .metric-eyebrow {
        margin-bottom: 6px;
      }

      .status-mix-top .panel-copy {
        margin-top: 4px;
        font-size: 12px;
        line-height: 1.4;
      }

      .status-mix-top .doughnut-wrap {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .status-mix-top .doughnut {
        width: 74px;
        height: 74px;
        flex: 0 0 74px;
      }

      .status-mix-top .doughnut::after {
        inset: 12px;
        background: var(--bg-soft);
      }

      .status-mix-top .doughnut-center strong {
        font-size: 16px;
      }

      .status-mix-top .doughnut-center .meta-text {
        font-size: 10px;
      }

      .status-mix-top .stack-list {
        gap: 6px;
      }

      .status-mix-top .stack-item {
        padding: 0;
        border: 0;
        background: transparent;
        gap: 8px;
        justify-content: flex-start;
      }

      .status-mix-top .stack-item strong,
      .status-mix-top .stack-item .meta-text {
        font-size: 12px;
      }

      .stack-list,
      .insight-list {
        display: grid;
        gap: 12px;
      }

      .stack-item,
      .insight-item {

  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      const { useEffect, useMemo, useState } = React;

      const firebaseConfig = {
        apiKey: "AIzaSyBHYARZ5NZIH3QUNOaVijmP8gvUQUfHdK8",
        authDomain: "rims-nicu-tracker.firebaseapp.com",
        projectId: "rims-nicu-tracker",
        storageBucket: "rims-nicu-tracker.firebasestorage.app",
        messagingSenderId: "330632025948",
        appId: "1:330632025948:web:353247817bf1138f359399",
        measurementId: "G-87Q44YRFDY"
      };

      const STATUS_META = {
        Admitted: { label: "Admitted", tone: "#6eaee6", bg: "rgba(125,196,248,0.18)" },
        Discharged: { label: "Discharged", tone: "#76c7b7", bg: "rgba(143,217,200,0.18)" },
        Died: { label: "Death", tone: "#e98bb0", bg: "rgba(244,174,203,0.2)" },
        LAMA: { label: "LAMA", tone: "#e6b07f", bg: "rgba(244,195,142,0.2)" },
        Transferred: { label: "Transferred", tone: "#a790ea", bg: "rgba(200,183,248,0.2)" }
      };

      const STATUS_ORDER = ["Admitted", "Discharged", "Died", "LAMA", "Transferred"];
      const DIAGNOSIS_OPTIONS = ["Pre Term", "Severe Birth Asphyxia", "SEPSIS", "RDS", "Others"];
      const SEX_OPTIONS = ["Male", "Female", "Ambiguous"];
      const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const VIEW_MODES = ["overview", "tracker", "reports"];
      const CHART_RANGES = ["day", "month", "year"];
      const SUMMARY_RANGES = ["day", "month", "year"];

      function useTheme() {
        const [theme, setTheme] = useState(() => localStorage.getItem("nicu-theme") || "light");

        useEffect(() => {
          document.body.classList.toggle("dark", theme === "dark");
          localStorage.setItem("nicu-theme", theme);
        }, [theme]);

        return [theme, setTheme];
      }

      function toDate(value) {
        if (!value) return null;
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function diffHours(startValue, endValue) {
        const start = toDate(startValue);
        const end = toDate(endValue);
        if (!start || !end) return null;
        return (end.getTime() - start.getTime()) / (1000 * 60 * 60);
      }

      function formatAge(hours) {
        if (hours === null || hours < 0) return "Invalid";
        const days = Math.floor(hours / 24);
        const rem = Math.floor(hours % 24);
        return `DOL ${days + 1} | ${days}d ${rem}h`;
      }

      function formatDateLabel(value) {
        const date = toDate(value);
        if (!date) return "Unavailable";
        return date.toLocaleDateString(undefined, { day: "2-digit", month: "short", year: "numeric" });
      }

      function formatShortDate(value) {
        const date = toDate(value);
        if (!date) return "—";
        return date.toLocaleDateString(undefined, { day: "2-digit", month: "short" });
      }

      function formatClock(value) {
        return value.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }

      function formatDayDate(value) {
        return value.toLocaleDateString(undefined, {
          weekday: "long",
          day: "2-digit",
          month: "long",
          year: "numeric"
        });
      }

      function getOutcomeHours(patient) {
        return diffHours(patient.dob, patient.outcomeDate);
      }

      function average(values) {
        const valid = values.filter(v => typeof v === "number" && !Number.isNaN(v));
        if (!valid.length) return 0;
        return valid.reduce((sum, value) => sum + value, 0) / valid.length;
      }

      function hexToRgba(hex, alpha) {
        const safe = hex.replace("#", "");
        const bigint = parseInt(safe, 16);
        const r = (bigint >> 16) & 255;
        const g = (bigint >> 8) & 255;
        const b = bigint & 255;
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function getRecentMonths() {
        const now = new Date();
        const months = [];
        for (let i = 5; i >= 0; i -= 1) {
          const cursor = new Date(now.getFullYear(), now.getMonth() - i, 1);
          months.push({
            key: `${cursor.getFullYear()}-${cursor.getMonth()}`,
            label: MONTHS[cursor.getMonth()],
            month: cursor.getMonth(),
            year: cursor.getFullYear()
          });
        }
        return months;
      }

      function getRecentDays() {
        const now = new Date();
        const days = [];
        for (let i = 6; i >= 0; i -= 1) {
          const cursor = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
          days.push({
            key: cursor.toISOString().slice(0, 10),
            label: cursor.toLocaleDateString(undefined, { day: "2-digit", month: "short" }),
            day: cursor.getDate(),
            month: cursor.getMonth(),
            year: cursor.getFullYear()
          });
        }
        return days;
      }

      function getRecentYears() {
        const now = new Date();
        const years = [];
        for (let i = 4; i >= 0; i -= 1) {
          const year = now.getFullYear() - i;
          years.push({
            key: String(year),
            label: String(year),
            year
          });
        }
        return years;
      }

      function statusBadge(status) {
        const meta = STATUS_META[status] || STATUS_META.Admitted;
        return {
          color: meta.tone,
          background: meta.bg
        };
      }

      function Icon({ children, size = 20, stroke = "currentColor" }) {
        return (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            {children}
          </svg>
        );
      }

      function ThemeToggle({ theme, setTheme }) {
        return (
          <div className="theme-toggle">
            <button type="button" className={`theme-option ${theme === "light" ? "active" : ""}`} onClick={() => setTheme("light")}>
              <Icon size={16}><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></Icon>
              Light
            </button>
            <button type="button" className={`theme-option ${theme === "dark" ? "active" : ""}`} onClick={() => setTheme("dark")}>
              <Icon size={16}><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"></path></Icon>
              Dark
            </button>
          </div>
        );
      }

      function SyncIndicator({ isSyncing, user, connectionError, lastUpdated, compact = false }) {
        const isLive = user && !connectionError && !isSyncing;
        const label = isSyncing ? "Connecting to Firebase" : isLive ? "Live Firebase sync active" : "Sync attention needed";
        const detail = connectionError ? connectionError : lastUpdated ? `Last update ${lastUpdated}` : "Waiting for first snapshot";
        return (
          <div className={`status-card ${compact ? "compact-status" : ""}`}>
            <div className="sync-chip">
              <span className={`sync-dot ${isLive ? "" : "offline"}`}></span>
              <strong>{label}</strong>
            </div>
            <p className="panel-copy" style={{ marginTop: 12 }}>{detail}</p>
          </div>
        );
      }

      function MetricCard({ eyebrow, value, subcopy }) {
        return (
          <div className="metric-card fade-in">
            <div className="metric-eyebrow">{eyebrow}</div>
            <div className="metric-value">{value}</div>
            <div className="metric-subcopy">{subcopy}</div>
          </div>
        );
      }

      function LineAreaChart({ data }) {
        const width = 620;
        const height = 250;
        const pad = 22;
        const innerHeight = height - pad * 2;
        const innerWidth = width - pad * 2;
        const maxValue = Math.max(1, ...data.map(item => Math.max(item.admissions, item.outcomes)));

        const pointsFor = key =>
          data.map((item, index) => {
            const x = pad + (innerWidth / Math.max(1, data.length - 1)) * index;
            const y = pad + innerHeight - (item[key] / maxValue) * innerHeight;
            return [x, y];
          });

        const lineToString = points => points.map(point => point.join(",")).join(" ");
        const areaToString = points => {
          const first = points[0];
          const last = points[points.length - 1];
          return `M ${first[0]} ${height - pad} L ${points.map(point => point.join(" ")).join(" L ")} L ${last[0]} ${height - pad} Z`;
        };

        const admissionsPoints = pointsFor("admissions");
        const outcomesPoints = pointsFor("outcomes");

        return (
          <div className="chart-frame">
            <svg viewBox={`0 0 ${width} ${height}`} width="100%" height="260" role="img" aria-label="Admissions and outcomes trend">
              {[0, 0.25, 0.5, 0.75, 1].map(step => {
                const y = pad + innerHeight - innerHeight * step;
                return (
                  <g key={step}>
                    <line x1={pad} y1={y} x2={width - pad} y2={y} stroke="rgba(148,163,184,0.18)" strokeDasharray="5 8"></line>
                    <text x="0" y={y + 4} fill="currentColor" opacity="0.45" fontSize="11">
                      {Math.round(maxValue * step)}
                    </text>
                  </g>
                );
              })}
              <path d={areaToString(admissionsPoints)} fill="rgba(125, 196, 248, 0.2)"></path>
              <polyline fill="none" stroke="#7dc4f8" strokeWidth="4" points={lineToString(admissionsPoints)}></polyline>
              <polyline fill="none" stroke="#f4aecb" strokeWidth="4" points={lineToString(outcomesPoints)}></polyline>
              {admissionsPoints.map((point, index) => (
                <g key={index}>
                  <circle cx={point[0]} cy={point[1]} r="4.8" fill="#7dc4f8"></circle>
                  <circle cx={outcomesPoints[index][0]} cy={outcomesPoints[index][1]} r="4.8" fill="#f4aecb"></circle>
                </g>
              ))}
            </svg>
            <div className="axis-labels">
              {data.map(item => <div key={item.key}>{item.label}</div>)}
            </div>
          </div>
        );
      }

      function DiagnosisBars({ items }) {
        const maxValue = Math.max(1, ...items.map(item => item.value));
        return (
          <div className="stack-list">
            {items.map(item => (
              <div className="stack-item" key={item.label}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", gap: 12 }}>
                    <strong>{item.label}</strong>
                    <span className="meta-text">{item.value}</span>
                  </div>
                  <div className="stack-bar">
                    <div
                      className="stack-fill"
                      style={{
                        width: `${(item.value / maxValue) * 100}%`,
                        background: item.color
                      }}
                    ></div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        );
      }

      function StatusDoughnut({ items, total, compact = false }) {
        let cursor = 0;
        const segments = items.map(item => {
          const percent = total ? (item.value / total) * 100 : 0;
          const start = cursor;
          cursor += percent;
          return `${item.color} ${start}% ${cursor}%`;
        });

        return (
          <div className={`doughnut-wrap ${compact ? "status-mix-top" : ""}`}>
            <div className="doughnut" style={{ background: `conic-gradient(${segments.join(", ")})` }}>
              <div className="doughnut-center">
                <div>
                  <strong>{total}</strong>
                  <div className="meta-text">{compact ? "records" : "active records"}</div>
                </div>
              </div>
            </div>
            <div>
              {compact && (
                <>
                  <div className="metric-eyebrow">Current status mix</div>
                  <p className="panel-copy">Outcome distribution across all patient records.</p>
                </>
              )}
              <div className="stack-list">
              {items.map(item => (
                <div className="stack-item" key={item.label}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span className="legend-swatch" style={{ background: item.color }}></span>
                    <strong>{item.label}</strong>
                  </div>
                  <span className="meta-text">{item.value}</span>
                </div>
              ))}
              </div>
            </div>
          </div>
        );
      }

      function OutcomeSpark({ items }) {
        const maxValue = Math.max(1, ...items.map(item => item.value));
        return (
          <div style={{ display: "grid", gap: 10 }}>
            {items.map(item => (
              <div key={item.label} style={{ display: "grid", gap: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", gap: 12 }}>
                  <strong>{item.label}</strong>
                  <span className="meta-text">{item.value}</span>
                </div>
                <div className="stack-bar" style={{ height: 12 }}>
                  <div
                    className="stack-fill"
                    style={{
                      width: `${(item.value / maxValue) * 100}%`,
                      background: `linear-gradient(90deg, ${hexToRgba(item.color, 0.5)}, ${item.color})`
                    }}
                  ></div>
                </div>
              </div>
            ))}
          </div>
        );
      }

      function StatusBadge({ status }) {
        const meta = statusBadge(status);
        return (
          <span className="badge" style={{ color: meta.color, background: meta.background }}>
            {STATUS_META[status]?.label || status}

      function ClockCard({ now }) {
        return (
          <div className="clock-card">
            <div className="metric-eyebrow">Ward Time</div>
            <div className="clock-time">{formatClock(now)}</div>
            <div className="clock-meta">{formatDayDate(now)}</div>
